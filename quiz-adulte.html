<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Expert – Thomery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-mark">
      <svg viewBox="0 0 22 22" fill="none">
        <rect x="1" y="9" width="20" height="12" rx="2" fill="white" opacity=".9"/>
        <polygon points="0,10 11,1 22,10" fill="white"/>
        <rect x="7" y="14" width="8" height="7" rx="1" fill="#5BADD6"/>
      </svg>
    </div>
    <span class="nav-name">Thomery</span>
  </div>
  <span class="nav-tag">Quiz Citoyen</span>
</nav>

<div class="quiz-wrap">
  <div class="quiz-header">
    <a href="index.html" class="back">← Accueil</a>
    <h2>Quiz Expert</h2>
    <p>Testez vos connaissances sur Thomery !</p>
  </div>

  <div class="qwrap">
    <div class="prog" id="prog">
      <div class="prog-track">
        <div class="prog-fill" id="fill" style="background:#5BADD6;width:0%"></div>
      </div>
      <div class="prog-lbl" id="lbl">1 / 13</div>
      <div class="prog-score" id="sc">0 pt</div>
    </div>
    <div id="area"></div>
  </div>
</div>

<script>
const Q=[
  {q:"Quel a été le nom du premier festival cannin dans la ville de Thomery ?",ch:["WoofThom","CanniThom","ThomWoof","CanniWoof"],c:3,e:"Le ThomWoof a été fait la premiere fois le 10 septembre 2024 dans les Jardin Salomon"},
  {q:"Comment la ville de Thomery est surnomée ?",ch:["La ville des vignes", "Village du raisin", "Village du vin", "Village de la vigne"]c:4,e:"La ville de thomery se surnomme le 'Village des vignes' en raison de sa culture traditionnelle du raisin, le chasselas. Cette ville est également connue pour son histoire riche et ses traditions, notamment la production du chasselas doré, qui a été une activité économique importante pendant plus de deux siècles."},
  {q:"Pour quoi la ville de Thomery est-t-elle connue ?",ch:["Mairie", "Jardin Salomon", "Chasselas doré", "Eglise"],c:3,e:"La culture du Chasselas doré nécessite une attention particulière pour garantir une production optimale "},
  {q:"Quel artiste peintre et sculptri(ce)(eur) du XIX ème siècle est connu a Thomery ?",ch:["Pablo Picasso", "Rosa Bonheur", "Claude Monet", "Gustav Kilmt"],c:2,e:"Rosa Bonheur est connue à Thomery pour son rôle central dans la peinture animalière et son atelier, construit par l'architecte Jules Saulnier. Elle a acquis le château de By en 1859, où elle a vécu pendant quarante ans. Son atelier, qui a conservé ses décors peints, mobilier et effets personnels, est ouvert au public depuis 2017. Rosa Bonheur a également été la première femme à recevoir la Légion d'honneur, ce qui a marqué son époque et son impact sur l'art et la société."},
  {q:"D'où provient le nom de la ville de Thomery de Henri IV",ch:["< Tout vas faire rire ici >", "< Tout me rit ici >", "< D'ici tout me rit >", "< Ici il y a tout qui me rit >"],c:3,e:"La tradition locale prête à Henri IV un bon mot lors de son séjour dans la zone de Champagne-sur-Seine. En voyant le coteau de Thomery, il déclare : « Ici tout me rit »"},
  {q:"Dans L'ancien temps qu'est-ce que le Jardin Salomon stockait ?",ch:["Des moutons", "Des Cheveaux", "Des vignes", "Caves a vin"],c:3,e:"Dans l'ancien temps ont stockais les vignes dans les serres et ont les cultivé au mur"},
  {q:"Quel est le nom du fleuve qui passe dans la ville de Thomery ? ?",ch:["L'Orvanne", "Loing", "Rhône", "Seine"],c:4,e:"La seine descend de paris en passent par Thomery."},
  {q:"Quelle est la longueur unique au monde du réseau de murs à vignes de Thomery ?",ch:["250 km", "100 km", "500 mètres", "400 km"],c:1,e:"Il s'étend sur 250 km, construit pour cultiver le chasselas doré en espalier sur des coteaux parfaitement orientés."},
  {q:"Quelle était la production maximale de chasselas à Thomery vers 1900 ?",ch:["800 tonnes", "20 grammes", "500 tonnes", "Plus de 250 k/g"],c:1,e:"Vers 1900 la ville de Thomery etait fortement acrive"},
  {q:"Rosa Bonheur était spécialisée dans la peinture de quoi ?",ch:["Animeaux", "Personnes", "Réaliste", "Abstrait"],c:1,e:"Rosa Bonheur s'est spécialisée dans la peinture animalières."},
  {q:"Quelle grande forêt est située près de Thomery ?",ch:["Foêt de Fontainebleau", "Forêt des Landes", "Forêt de Haye", "Forêt de Tronçais"],c:1,e:"La forêt de Fontainebleau est la forêt la pljus proche de Thomery"},
  {q:"En quelle année le dernier colis de chasselas a-t-il quitté Thomery ?",ch:["2015", "2010", "2026", "1970"],c:2,e:"Le dernier colis de chasselas a avoir quitté Thomery etait en 1970"},
  {q:"Quelle émission de France 3 a mis Thomery en avant en 2024 ?",ch:["Des racines et des ailes","Le Village préféré des Français","Faut pas rêver","Échappées belles"],c:1,e:"Thomery a représenté l'Île-de-France dans Le Village préféré des Français en 2024."}
  {q:"Dans quel château vivait Rosa Bonheur à Thomery ?",ch:["Un Penthouse", "Le château de Chambord", "Le château de Versaille", "Le château de By"],c:4,e:"Le château de By a été sa maison pendant plusieurs anées"},
  {q:"Quelle célébrité fit l'oraison funèbre du peintre Francis Gruber dans le cimetière de Thomery ?",ch:["Louis Aragon", "Pablo Piccasso", "Rosa Bonheur", "Alfred Sisley"],c:1,e:"Louis Aragon, et c'est Alberto Giacometti qui dessina sa tombe."},
  {q:"Quels animaux insolites vivaient dans la ménagerie de Rosa Bonheur à Thomery ?",ch:["Vaches, chevaux, moutons, cerfs, et même une paire de lions apprivoisés.", "Des rongeur", "Des animeaux aquatiques"],c:1,e:"Rosa Bonheur est aussi connue pour avoir des animeaux de toutes races"},
  {q:"Comment Rosa Bonheur a-t-elle financé l'achat du château de By à Thomery ?",ch:["Du vin", "Une vente de terrains", "Son tableau ' Le Marché aux chevaux '"],c:2,e:"Grâce à la vente de son tableau Le Marché aux chevaux, succès international du Salon de 1853."},
  {q:"Qu'était 'Thomery-Plage', ouverte en 1925 ?",ch:["Station de loisir", "Port", "Barrage", "Pont"],c:1,e:"Une station de loisirs avec restaurant, salle de dancing animée par un jazz-band américain (le 'Patam-jazz'), baignade et promenades en barque, promue jusqu'à la Gare de Lyon à Paris."},
  {q:"Quel roi de France a séjourné au château de la Rivière à Thomery en 1727 et 1732 ?",ch:["Louis XV", "Louis XIV", "Louis XVI", "Louis XIII"],c:1,e:"Louis XV, qui fit également paver le chemin menant de Thomery au château de Fontainebleau, l'Allée du Pavé du Prince."},
  {q:"Quelle distinction Rosa Bonheur a-t-elle été la première femme à recevoir en 1865 ?",ch:["Ordres des Art et des Lettres", "Ordre National su Mérite", "Legion D'honneur", "Ordre de la libération "],c:3,e:"La Légion d'honneur, remise en main propre par l'impératrice Eugénie au château de By."},

];

const L=['A','B','C','D'];
let cur=0,score=0,answered=false;

function render(){
  answered=false;
  const q=Q[cur],n=Q.length;
  document.getElementById('fill').style.width=(cur/n*100)+'%';
  document.getElementById('lbl').textContent=`${cur+1} / ${n}`;
  document.getElementById('sc').textContent=`${score} pt`;
  document.getElementById('area').innerHTML=`
    <div class="qbox">
      <div class="qn" style="color:#5BADD6">Question ${cur+1} sur ${n}</div>
      <div class="qt">${q.q}</div>
      <div class="choices">${q.ch.map((c,i)=>`
        <button class="cbtn" onclick="aQCM(${i})" id="c${i}">
          <span class="cl">${L[i]}</span>${c}
        </button>`).join('')}</div>
      <div id="fba"></div>
      <button class="btn-next" id="bn" onclick="next()">${cur<n-1?'Question suivante →':'Voir mes résultats →'}</button>
    </div>`;
}

function aQCM(idx){
  if(answered)return;answered=true;
  const q=Q[cur],ok=idx===q.c;if(ok)score++;
  document.querySelectorAll('.cbtn').forEach(b=>b.disabled=true);
  document.getElementById('c'+idx).classList.add(ok?'correct':'wrong');
  if(!ok)document.getElementById('c'+q.c).classList.add('correct');
  document.getElementById('fba').innerHTML=ok
    ?`<div class="fb ok"><span class="fb-i">✅</span><div class="fb-t"><strong>Bonne réponse !</strong>${q.e}</div></div>`
    :`<div class="fb ko"><span class="fb-i">❌</span><div class="fb-t"><strong>Mauvaise réponse.</strong> La bonne réponse était <strong style="color:#fff">${q.ch[q.c]}</strong>. ${q.e}</div></div>`;
  document.getElementById('bn').classList.add('show');
  document.getElementById('sc').textContent=`${score} pt`;
}

function next(){
  cur++;
  if(cur>=Q.length)showRes();else render();
}

function showRes(){
  const n=Q.length,pct=Math.round(score/n*100);
  document.getElementById('prog').style.display='none';
  const msg=pct>=80?'Félicitations ! Vous connaissez très bien Thomery !':pct>=50?'Pas mal ! Vous êtes bien informé(e) sur la commune.':'Il reste encore de belles choses à découvrir sur Thomery !';
  document.getElementById('area').innerHTML=`
    <div class="res">
      <div class="res-ring"><div class="res-big">${score}/${n}</div><div class="res-pct">${pct}%</div></div>
      <div class="res-title">Quiz terminé !</div>
      <div class="res-sub">${msg}</div>
      <div class="res-stats">
        <div class="stat"><div class="stat-n g">${score}</div><div class="stat-l">Bonnes</div></div>
        <div class="stat"><div class="stat-n r">${n-score}</div><div class="stat-l">Mauvaises</div></div>
        <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">Score</div></div>
      </div>
      <div class="res-btns">
        <button class="btn-white" onclick="cur=0;score=0;document.getElementById('prog').style.display='flex';render()">↺ Rejouer</button>
        <a href="index.html" class="btn-ghost">← Accueil</a>
        <a href="avis.html" class="btn-ghost">⭐ Donner mon avis</a>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
