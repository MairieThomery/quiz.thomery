<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Expert – Thomery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-mark">
      <svg viewBox="0 0 22 22" fill="none">
        <rect x="1" y="9" width="20" height="12" rx="2" fill="white" opacity=".9"/>
        <polygon points="0,10 11,1 22,10" fill="white"/>
        <rect x="7" y="14" width="8" height="7" rx="1" fill="#5BADD6"/>
      </svg>
    </div>
    <span class="nav-name">Thomery</span>
  </div>
  <span class="nav-tag">Quiz Citoyen</span>
</nav>

<div class="quiz-wrap">
  <div class="quiz-header">
    <a href="index.html" class="back">← Accueil</a>
    <h2>Quiz Expert</h2>
    <p>Testez vos connaissances sur Thomery !</p>
  </div>

  <div class="qwrap">
    <div class="prog" id="prog">
      <div class="prog-track">
        <div class="prog-fill" id="fill" style="background:#5BADD6;width:0%"></div>
      </div>
      <div class="prog-lbl" id="lbl">1 / 13</div>
      <div class="prog-score" id="sc">0 pt</div>
    </div>
    <div id="area"></div>
  </div>
</div>

<script>
const Q = [
  {
    q: "Quel a été le nom du premier festival canin dans la ville de Thomery ?",
    ch: ["WoofThom", "CanniThom", "ThomWoof", "CanniWoof"],
    c: 3,
    e: "Le ThomWoof a été organisé pour la première fois le 10 septembre 2024 dans les Jardins Salomon."
  },

  {
    q: "Comment la ville de Thomery est-elle surnommée ?",
    ch: ["La ville des vignes", "Village du raisin", "Village du vin", "Village de la vigne"],
    c: 3,
    e: "Thomery est surnommée le 'Village de la vigne' grâce à sa culture traditionnelle du chasselas doré."
  },

  {
    q: "Pour quoi la ville de Thomery est-elle connue ?",
    ch: ["La mairie", "Le Jardin Salomon", "Le chasselas doré", "L’église"],
    c: 2,
    e: "Thomery est connue pour la culture du chasselas doré, un raisin célèbre cultivé sur des murs à vignes."
  },

  {
    q: "Quel artiste peintre et sculpteur du XIXe siècle est connu à Thomery ?",
    ch: ["Pablo Picasso", "Rosa Bonheur", "Claude Monet", "Gustav Klimt"],
    c: 1,
    e: "Rosa Bonheur a vécu au château de By à Thomery pendant de nombreuses années."
  },

  {
    q: "Quelle phrase Henri IV aurait-il prononcée à propos de Thomery ?",
    ch: [
      "Tout va faire rire ici",
      "Tout me rit ici",
      "D’ici tout me rit",
      "Ici il y a tout qui me rit"
    ],
    c: 2,
    e: "La tradition raconte qu’Henri IV aurait déclaré : 'Tout me rit ici'."
  },

  {
    q: "Dans l’ancien temps, que stockait-on dans les serres du Jardin Salomon ?",
    ch: ["Des moutons", "Des chevaux", "Des vignes", "Des caves à vin"],
    c: 2,
    e: "Les serres servaient autrefois à cultiver et protéger les vignes."
  },

  {
    q: "Quel est le nom du fleuve qui passe dans la ville de Thomery ?",
    ch: ["L'Orvanne", "Le Loing", "Le Rhône", "La Seine"],
    c: 3,
    e: "La Seine traverse Thomery après être passée par Paris."
  },

  {
    q: "Quelle est la longueur unique au monde du réseau de murs à vignes de Thomery ?",
    ch: ["250 km", "100 km", "500 mètres", "400 km"],
    c: 0,
    e: "Le réseau de murs à vignes de Thomery s’étend sur environ 250 km."
  },

  {
    q: "Quelle était la production maximale de chasselas à Thomery vers 1900 ?",
    ch: ["800 tonnes", "20 grammes", "500 tonnes", "250 kg"],
    c: 0,
    e: "Vers 1900, Thomery produisait jusqu’à 800 tonnes de chasselas."
  },

  {
    q: "Rosa Bonheur était spécialisée dans la peinture de quoi ?",
    ch: ["Animaux", "Personnes", "Paysages", "Abstrait"],
    c: ,
    e: "Rosa Bonheur était célèbre pour ses peintures animalières."
  },

  {
    q: "Quelle grande forêt est située près de Thomery ?",
    ch: [
      "Forêt de Fontainebleau",
      "Forêt des Landes",
      "Forêt de Haye",
      "Forêt de Tronçais"
    ],
    c: 0,
    e: "La forêt de Fontainebleau est située à proximité de Thomery."
  },

  {
    q: "En quelle année le dernier colis de chasselas a-t-il quitté Thomery ?",
    ch: ["2015", "1970", "2026", "1990"],
    c: 3,
    e: "Le dernier colis de chasselas expédié depuis Thomery date de 1970."
  },

  {
    q: "Quelle émission de France 3 a mis Thomery en avant en 2024 ?",
    ch: [
      "Des racines et des ailes",
      "Le Village préféré des Français",
      "Faut pas rêver",
      "Échappées belles"
    ],
    c: 1,
    e: "Thomery a représenté l’Île-de-France dans 'Le Village préféré des Français'."
  },

  {
    q: "Dans quel château vivait Rosa Bonheur à Thomery ?",
    ch: [
      "Un penthouse",
      "Le château de Chambord",
      "Le château de Versailles",
      "Le château de By"
    ],
    c: 3,
    e: "Le château de By fut la résidence de Rosa Bonheur."
  },

  {
    q: "Quelle célébrité fit l’oraison funèbre du peintre Francis Gruber à Thomery ?",
    ch: ["Louis Aragon", "Pablo Picasso", "Rosa Bonheur", "Alfred Sisley"],
    c: 0,
    e: "Louis Aragon prononça l’oraison funèbre de Francis Gruber."
  },

  {
    q: "Quels animaux insolites vivaient dans la ménagerie de Rosa Bonheur ?",
    ch: [
      "Vaches, chevaux, moutons et lions apprivoisés",
      "Des rongeurs",
      "Des animaux aquatiques",
      "Des oiseaux exotiques"
    ],
    c: 0,
    e: "Rosa Bonheur possédait plusieurs animaux, dont des lions apprivoisés."
  },

  {
    q: "Comment Rosa Bonheur a-t-elle financé l’achat du château de By ?",
    ch: [
      "Grâce au vin",
      "Grâce à une vente de terrains",
      "Grâce à son tableau 'Le Marché aux chevaux'",
      "Grâce à un héritage"
    ],
    c: 2,
    e: "Le succès du tableau 'Le Marché aux chevaux' lui permit d’acheter le château."
  },

  {
    q: "Qu’était 'Thomery-Plage', ouverte en 1925 ?",
    ch: [
      "Une station de loisirs",
      "Un port",
      "Un barrage",
      "Un pont"
    ],
    c: 0,
    e: "Thomery-Plage était une station de loisirs avec baignade et dancing."
  },

  {
    q: "Quel roi de France a séjourné au château de la Rivière à Thomery ?",
    ch: ["Louis XV", "Louis XIV", "Louis XVI", "Louis XIII"],
    c: 0,
    e: "Louis XV séjourna au château de la Rivière en 1727 et 1732."
  },

  {
    q: "Quelle distinction Rosa Bonheur fut-elle la première femme à recevoir ?",
    ch: [
      "Ordre des Arts et des Lettres",
      "Ordre national du Mérite",
      "Légion d’honneur",
      "Ordre de la Libération"
    ],
    c: 2,
    e: "Rosa Bonheur fut la première femme décorée de la Légion d’honneur."
  }
];

const L = ['A', 'B', 'C', 'D'];

let cur = 0;
let score = 0;
let answered = false;
  
function render(){
  answered=false;
  const q=Q[cur],n=Q.length;
  document.getElementById('fill').style.width=(cur/n*100)+'%';
  document.getElementById('lbl').textContent=`${cur+1} / ${n}`;
  document.getElementById('sc').textContent=`${score} pt`;
  document.getElementById('area').innerHTML=`
    <div class="qbox">
      <div class="qn" style="color:#5BADD6">Question ${cur+1} sur ${n}</div>
      <div class="qt">${q.q}</div>
      <div class="choices">${q.ch.map((c,i)=>`
        <button class="cbtn" onclick="aQCM(${i})" id="c${i}">
          <span class="cl">${L[i]}</span>${c}
        </button>`).join('')}</div>
      <div id="fba"></div>
      <button class="btn-next" id="bn" onclick="next()">${cur<n-1?'Question suivante →':'Voir mes résultats →'}</button>
    </div>`;
}

function aQCM(idx){
  if(answered)return;answered=true;
  const q=Q[cur],ok=idx===q.c;if(ok)score++;
  document.querySelectorAll('.cbtn').forEach(b=>b.disabled=true);
  document.getElementById('c'+idx).classList.add(ok?'correct':'wrong');
  if(!ok)document.getElementById('c'+q.c).classList.add('correct');
  document.getElementById('fba').innerHTML=ok
    ?`<div class="fb ok"><span class="fb-i">✅</span><div class="fb-t"><strong>Bonne réponse !</strong>${q.e}</div></div>`
    :`<div class="fb ko"><span class="fb-i">❌</span><div class="fb-t"><strong>Mauvaise réponse.</strong> La bonne réponse était <strong style="color:#fff">${q.ch[q.c]}</strong>. ${q.e}</div></div>`;
  document.getElementById('bn').classList.add('show');
  document.getElementById('sc').textContent=`${score} pt`;
}

function next(){
  cur++;
  if(cur>=Q.length)showRes();else render();
}

function showRes(){
  const n=Q.length,pct=Math.round(score/n*100);
  document.getElementById('prog').style.display='none';
  const msg=pct>=80?'Félicitations ! Vous connaissez très bien Thomery !':pct>=50?'Pas mal ! Vous êtes bien informé(e) sur la commune.':'Il reste encore de belles choses à découvrir sur Thomery !';
  document.getElementById('area').innerHTML=`
    <div class="res">
      <div class="res-ring"><div class="res-big">${score}/${n}</div><div class="res-pct">${pct}%</div></div>
      <div class="res-title">Quiz terminé !</div>
      <div class="res-sub">${msg}</div>
      <div class="res-stats">
        <div class="stat"><div class="stat-n g">${score}</div><div class="stat-l">Bonnes</div></div>
        <div class="stat"><div class="stat-n r">${n-score}</div><div class="stat-l">Mauvaises</div></div>
        <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">Score</div></div>
      </div>
      <div class="res-btns">
        <button class="btn-white" onclick="cur=0;score=0;document.getElementById('prog').style.display='flex';render()">↺ Rejouer</button>
        <a href="index.html" class="btn-ghost">← Accueil</a>
        <a href="avis.html" class="btn-ghost">⭐ Donner mon avis</a>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
